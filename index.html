<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>CommutePilot — today's session</title>
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CommutePilot">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <h1>CommutePilot</h1>
    <p id="built-at">Loading your session…</p>
  </header>

  <main>
    <div id="cards" class="cards"></div>

    <div class="refresh-row">
      <button id="refresh-all" class="refresh">↻ Refresh all four picks</button>
    </div>

    <section class="browse">
      <h2>Browse the shelves</h2>
      <p>Everything curated so far, by category.</p>
      <div id="browse-body"></div>
    </section>
  </main>

  <footer>
    <p>Playback happens in your podcast app — CommutePilot never hosts audio.<br>
    Buttons: Apple Podcasts (iPhone) · Overcast · pod.link (Android &amp; everything else).</p>
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
