# XcodeGen spec for Foray.
#
# On the Mac:
#   brew install xcodegen
#   cd ios
#   xcodegen
#   open Foray.xcodeproj
#
# This generates a single "Foray" app target from ios/App, wired to
# the local ForayKit Swift package (ios/ForayKit) as a
# dependency. ForayKitTests runs via Xcode's native local-package
# test integration (it shows up automatically in the Test navigator once
# the package is a dependency — no separate XcodeGen test target needed)
# or via `swift test` directly inside ios/ForayKit.
#
# AUDIT: this file has never been run through the real `xcodegen` binary
# (Windows dev machine, no Xcode/xcodegen available here). The overall
# shape (options/packages/targets/schemes) matches XcodeGen's documented
# project.yml schema, but re-verify key names and generated-Info.plist
# behavior on the Mac — in particular whether `info.properties` alone (no
# `info.path`) is sufficient for the current XcodeGen version to synthesize
# a valid Info.plist, or whether an explicit Info.plist file is preferred.

name: Foray

options:
  bundleIdPrefix: com.wjduvall
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Keep the generated .xcodeproj out of source control noise; regenerate
  # with `xcodegen` any time project.yml or the file layout changes.
  generateEmptyDirectories: false

packages:
  ForayKit:
    path: ForayKit

targets:
  Foray:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: ForayKit
        product: ForayKit
    info:
      properties:
        CFBundleDisplayName: Foray
        UILaunchScreen: {}
        # Background audio playback (04_VOICE_AUDIO_SPEC.md: playback must
        # survive backgrounding/lock — every commute session is played with
        # the phone locked or in a car dock). This is the ONLY background
        # mode declared; we do not need background fetch/processing for
        # anything in this deliverable (DownloadManager's background
        # URLSession config is a separate, not-yet-implemented piece — see
        # README).
        UIBackgroundModes:
          - audio
        # 01_PROMPT.md hard constraint #6 / decisions: hold-to-talk uses
        # on-device SFSpeechRecognizer (requiresOnDeviceRecognition = true)
        # over the phone mic. Both strings are required by iOS to even
        # present the permission prompt; VoiceController (not implemented
        # in this scaffold) is what will actually trigger these prompts.
        NSMicrophoneUsageDescription: >-
          Foray listens briefly when you hold the talk button, so you
          can say things like "skip" or "something different" without
          touching your phone while driving.
        NSSpeechRecognitionUsageDescription: >-
          Foray uses on-device speech recognition to understand your
          hold-to-talk voice commands. Recognition happens entirely on your
          phone, offline.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wjduvall.foray
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        # AUDIT: "targeted" (warn only where actor-isolation is already
        # explicit, e.g. inside PlayerQueueManager) rather than "complete" —
        # none of this code has been compiled, so a handful of
        # not-yet-Sendable-audited types crossing into Task{} closures
        # (e.g. Foundation's `Notification` in the NotificationCenter
        # observer closures in PlayerQueueManager.swift) are expected.
        # Ratchet this up to "complete" once those are cleaned up on the Mac.
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_PREVIEWS: "YES"
        # AUDIT: set your own team here (or configure signing manually in
        # Xcode after `xcodegen` runs) — left blank so this file doesn't
        # encode anyone's personal Apple Developer Team ID.
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

schemes:
  Foray:
    build:
      targets:
        Foray: all
    run:
      config: Debug
    test:
      config: Debug
      # ForayKitTests is picked up automatically once the package
      # is added as a target dependency above; listed explicitly here so
      # `xcodebuild test -scheme Foray` also runs it from the CLI.
      targets:
        - name: ForayKitTests
          parallelizable: true
    archive:
      config: Release
